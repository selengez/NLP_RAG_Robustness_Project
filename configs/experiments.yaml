dataset:
  type: fever  # fever | hotpot 
  max_samples: 50
  seed: 42
  processed_path: data/raw/fever_train.json
  hotpot_path: data/raw/hotpot_train.json

poisoning:
  strategies:
    - false_evidence
    - conflicting_evidence
    - confident_false_evidence
    - mixed_evidence
  poison_rates: [0.0, 0.25, 0.5, 0.75]
  seed: 42

evaluation:
  modes:
    - standard_prompt
    - verification_prompt
    - uncertainty_prompt
  metrics:
    - exact_match
    - hallucination_rate
    - source_grounding
    - poison_acceptance_rate
    - conflict_detection_rate

output:
  results_dir: results/
